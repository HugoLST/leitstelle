<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leitstelle / ELR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="terminal-header">
        <div class="header-title">⚡ ELR HAMBURG // POLIZEI & FEUERWEHR //</div>
        <div class="header-controls">
            <button class="info-btn" onclick="openModal()">ℹ️ INFO</button>
            <button class="notes-toggle-btn" onclick="toggleNotes()">📋 NOTIZEN (F4)</button>
        </div>
    </header>

    <div id="notesSidebar" class="sidebar">
        <div class="sidebar-header">
            <h3>📝 LAUFENDE NOTIZEN</h3>
            <button onclick="toggleNotes()" class="close-btn">X</button>
        </div>
        <textarea id="notesArea" placeholder="Hier Kennzeichen, Personalien, Funkrufnamen oder Standort-Details eintragen..."></textarea>
    </div>

    <main class="container">
        <div class="terminal-brand">
            <h1>Leitstelle Hamburg / 110 & 112</h1>
            <p class="subtitle">Bundesland Hamburg — Abfrage über Klartext-Stichwort oder Funkabkürzung.</p>
        </div>

        <div class="search-wrapper">
            <input type="text" id="searchInput" placeholder="Stichwort oder Kürzel eingeben (z.B. vu p, hg, ams, brand, we)..." autofocus>
            <button onclick="searchStichwort()" class="scan-btn">SUCHEN [ENTER]</button>
        </div>

        <div id="result">
            <div class="status-placeholder"> Erwarte Stichwort / Einsatz Stichwort</div>
        </div>
    </main>

    <!-- Info/Einsatz Modal -->
    <div id="infoModal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">System-Informationen</h2>
            </div>
            <div class="modal-body">
                <p id="modalText"></p>
                <div class="feedback-section" style="margin-top:20px; border-top:1px solid #1e293b; padding-top:15px;">
                    <p>System bewerten:</p>
                    <div class="stars" id="star-rating">
                        <div class="stars" id="star-rating">
                            <!-- Im infoModal innerhalb des modal-body -->
                        <div class="feedback-section" style="margin-top: 20px; border-top: 1px solid #1e293b; padding-top: 15px;">
                            <p>System bewerten:</p>
                            <!-- Sterne in umgekehrter HTML-Reihenfolge für den Hover-Effekt -->
                            <div class="stars" id="star-rating">
                                <span onclick="sendFeedback(5)">★</span>
                                <span onclick="sendFeedback(4)">★</span>
                                <span onclick="sendFeedback(3)">★</span>
                                <span onclick="sendFeedback(2)">★</span>
                                <span onclick="sendFeedback(1)">★</span>
                            </div>
                        </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button onclick="closeModal()" class="close-modal">SCHLIEẞEN</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
